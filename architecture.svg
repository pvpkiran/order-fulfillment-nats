<svg width="720" height="360" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="720" height="360" fill="#FFFFFF"/>

<!-- Client -->
<rect x="260" y="20" width="160" height="44" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1"/>
<text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#374151">Client</text>

<!-- Client -> Publisher -->
<line x1="305" y1="64" x2="105" y2="118" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Client -> QueryService -->
<line x1="385" y1="64" x2="575" y2="118" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- dashed direct reads: Client -> KV, Client -> ObjStore -->
<polyline points="420,42 700,42 700,258 492,258" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<polyline points="420,50 712,50 712,258 652,258" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Application tier -->
<text x="20" y="103" font-size="12" fill="#6B7280">Application tier</text>
<line x1="20" y1="110" x2="660" y2="110" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 4"/>

<!-- Publisher -->
<rect x="30" y="120" width="140" height="56" rx="8" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1"/>
<text x="100" y="140" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#1E3A8A">OrderPublisher</text>
<text x="100" y="158" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#1E3A8A">publish orders.new</text>

<!-- Workers -->
<rect x="190" y="120" width="140" height="56" rx="8" fill="#FDE2DD" stroke="#B91C1C" stroke-width="1"/>
<text x="260" y="140" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#7F1D1D">Workers (x3)</text>
<text x="260" y="158" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7F1D1D">pull + ack/nak/term</text>

<!-- Watcher -->
<rect x="350" y="120" width="140" height="56" rx="8" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1"/>
<text x="420" y="140" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#4C1D95">StatusWatcher</text>
<text x="420" y="158" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#4C1D95">watchAll - live</text>

<!-- QueryService -->
<rect x="510" y="120" width="140" height="56" rx="8" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1"/>
<text x="580" y="140" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#1E3A8A">order-query-service</text>
<text x="580" y="158" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#1E3A8A">x3, NATS request/reply</text>

<!-- NATS tier -->
<text x="20" y="213" font-size="12" fill="#6B7280">NATS JetStream tier</text>
<line x1="20" y1="220" x2="660" y2="220" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 4"/>

<!-- Stream -->
<rect x="30" y="230" width="140" height="56" rx="8" fill="#FDE2DD" stroke="#B91C1C" stroke-width="1"/>
<text x="100" y="250" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#7F1D1D">ORDERS stream</text>
<text x="100" y="268" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7F1D1D">WorkQueue retention</text>

<!-- Consumer -->
<rect x="190" y="230" width="140" height="56" rx="8" fill="#FEF3C7" stroke="#B45309" stroke-width="1"/>
<text x="260" y="250" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#78350F">order-workers</text>
<text x="260" y="268" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#78350F">durable consumer</text>

<!-- KV -->
<rect x="350" y="230" width="140" height="56" rx="8" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1"/>
<text x="420" y="250" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#4C1D95">order-status</text>
<text x="420" y="268" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#4C1D95">KV bucket</text>

<!-- ObjStore -->
<rect x="510" y="230" width="140" height="56" rx="8" fill="#CCFBF1" stroke="#0F766E" stroke-width="1"/>
<text x="580" y="250" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#134E4A">invoices</text>
<text x="580" y="268" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#134E4A">Object Store</text>

<!-- Publisher -> Stream -->
<line x1="100" y1="176" x2="100" y2="230" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Stream -> Consumer -->
<line x1="170" y1="258" x2="190" y2="258" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Consumer -> Workers -->
<line x1="260" y1="230" x2="260" y2="176" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Workers -> KV -->
<line x1="300" y1="176" x2="390" y2="230" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Workers -> ObjStore -->
<line x1="320" y1="176" x2="550" y2="230" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Watcher -> KV -->
<line x1="420" y1="176" x2="420" y2="230" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- QueryService -> KV -->
<line x1="550" y1="176" x2="450" y2="230" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Legend -->
<text x="20" y="320" font-size="11" fill="#6B7280">Blue = client-facing entry points   Coral = order stream / processing   Amber = durable consumer   Purple = status (KV)   Teal = object storage</text>
<text x="20" y="340" font-size="11" fill="#9CA3AF">Dashed lines = direct reads from OrderController (GET /orders/{id}/status, GET /orders/{id}/invoice)</text>
</svg>
